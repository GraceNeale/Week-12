<!DOCTYPE html>
<html>
    <head>
        <title>Café</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>le Café</h1>
        <div class="background">
            <p>This is a comfortable and welcoming café.</p>
            <img src="cafe.png">
            <h2>FAQ:</h2>
            <div class="faq-item">
                <button class="faq-question">Do you have oat milk?</button>
                <div class="faq-answer">No.</div>
            </div>
            <div class="faq-item">
                <button class="faq-question">Do you allow dogs?</button>
                <div class="faq-answer">No.</div>
            </div>
            <div class="faq-item">
                <button class="faq-question">Do you provide WiFi access?</button>
                <div class="faq-answer">No.</div>
            </div>
        </div>
        <button class="style-toggle">Toggle Day/Night Mode</button>
        
        <script src="script.js"></script>
    </body>
</html>
